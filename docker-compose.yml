services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build: ./src/cms
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-secret-change-me}
      NODE_ENV: development
    volumes:
      - cms_media:/app/media
    ports:
      - "3000:3000"

  frontend:
    build: ./src/frontend
    restart: unless-stopped
    depends_on:
      - cms
    environment:
      CMS_URL: http://cms:3000

  nginx:
    build: ./src/nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - cms
    ports:
      - "80:80"

volumes:
  db_data:
  cms_media:
