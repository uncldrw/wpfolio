services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: .
      dockerfile: ./src/cms/Dockerfile
    image: wpfolio-cms:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-secret-change-me}
      NEXT_PUBLIC_SERVER_URL: ${CMS_PUBLIC_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:4321,http://localhost:3000}
      PAYLOAD_FORCE_DRIZZLE_PUSH: "true"
      # NODE_ENV=development damit Payloads pushDevSchema beim ersten getPayload()
      # Aufruf das Drizzle-Schema in die DB pusht. `next start` läuft trotzdem auf
      # dem zuvor gebauten Production-Bundle (next build).
      NODE_ENV: development
    volumes:
      - cms_media:/app/media
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    build:
      context: .
      dockerfile: ./src/frontend/Dockerfile
    image: wpfolio-frontend:latest
    restart: unless-stopped
    depends_on:
      - cms
    environment:
      CMS_URL: http://cms:3000
    deploy:
      resources:
        limits:
          memory: 256m

  nginx:
    build:
      context: ./src/nginx
    image: wpfolio-nginx:latest
    restart: unless-stopped
    depends_on:
      - frontend
      - cms
    ports:
      - "${NGINX_PORT:-80}:80"

volumes:
  db_data:
  cms_media:
